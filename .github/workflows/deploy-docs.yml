name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'tutorial/**'
      - '.vitepress/**'
      - '.github/workflows/**'
      - pnpm-lock.yaml

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm docs:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: '47025005f4f0aa89f18af1b2078744ff'
          command: pages deploy tutorial/.vitepress/dist --project-name=invnz
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
